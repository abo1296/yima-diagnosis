name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: OpenNext Build
        run: npx opennextjs-cloudflare build

      - name: Patch UTF-8 body corruption
        run: node -e "const fs=require('fs');const path=require('path');function walk(dir){for(const f of fs.readdirSync(dir)){const p=path.join(dir,f);if(fs.statSync(p).isDirectory()){if(!f.startsWith('.'))walk(p)}else if(f.endsWith('.js')||f.endsWith('.mjs')){const c=fs.readFileSync(p,'utf8');if(c.includes('delete req.body')){fs.writeFileSync(p,c.replace('delete req.body','// PATCHED: delete req.body'),'utf8');console.log('Patched:',p)}}}}walk('.open-next')"

      - name: Inject KV binding
        run: node -e "const f=require('fs');const c=JSON.parse(f.readFileSync('wrangler.jsonc','utf8'));c.kv_namespaces=[{binding:'YIMA_LEADS',id:'79c7a651e94d42bd88cc125be8940373'}];f.writeFileSync('wrangler.jsonc',JSON.stringify(c,null,'\t'))"

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
