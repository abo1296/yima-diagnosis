name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Inject Cloudflare credentials
        env:
          CF_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CF_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
        run: |
          sed -i "s#__CF_ACCOUNT_ID__#7d28e78cd333b311a73ef48b0f068019#g" app/api/leads/route.ts
          sed -i "s#__CF_API_KEY__#$CF_API_KEY#g" app/api/leads/route.ts
          sed -i "s#__CF_EMAIL__#$CF_EMAIL#g" app/api/leads/route.ts

      - name: OpenNext Build
        run: npx opennextjs-cloudflare build

      - name: Patch UTF-8 body corruption
        run: |
          find .open-next -type f -name "*.js" | xargs grep -l "delete req.body" > /tmp/patch_files.txt 2>/dev/null || true
          if [ -s /tmp/patch_files.txt ]; then
            while IFS= read -r f; do
              echo "Patching: $f"
              sed -i 's/delete req.body/\/\/ patched: delete req.body/' "$f"
            done < /tmp/patch_files.txt
          else
            echo "No files to patch"
          fi

      - name: Inject KV binding
        run: node -e "const f=require('fs');const c=JSON.parse(f.readFileSync('wrangler.jsonc','utf8'));c.kv_namespaces=[{binding:'YIMA_LEADS',id:'79c7a651e94d42bd88cc125be8940373'}];f.writeFileSync('wrangler.jsonc',JSON.stringify(c,null,'\t'))"

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
